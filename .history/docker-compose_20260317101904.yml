services:
  backend:
    build:
      context: ./backend
  container_name: workflow-backend
  ports:
    - "8000:8000"
  volumes:
    - ./backend:/app
  restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: workflow-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    restart: unless-stopped